<div class="login-page">
  <div class="login-card">
    <div class="login-card__header">
      <span class="login-card__logo">🎓</span>
      <h1>CampusConnect</h1>
      <p>DHBW Lörrach</p>
    </div>

    <div class="login-card__tabs">
      <button [class.active]="_mode() === 'login'" (click)="switchMode('login')">Anmelden</button>
      <button [class.active]="_mode() === 'register'" (click)="switchMode('register')">Registrieren</button>
    </div>

    @if (_mode() === 'login') {
      <form (ngSubmit)="onLogin()" class="login-card__form">
        <label>
          E-Mail
          <input type="email" [(ngModel)]="_loginForm.email" name="email" placeholder="name@dhbw-loerrach.de" required />
        </label>
        <label>
          Passwort
          <input type="password" [(ngModel)]="_loginForm.password" name="password" required />
        </label>
        @if (_error()) {
          <p class="login-card__error">{{ _error() }}</p>
        }
        <button type="submit" [disabled]="_isLoading()">
          {{ _isLoading() ? 'Bitte warten…' : 'Anmelden' }}
        </button>
      </form>
    }

    @if (_mode() === 'register') {
      <form (ngSubmit)="onRegister()" class="login-card__form">
        <label>
          E-Mail (@dhbw-loerrach.de)
          <input type="email" [(ngModel)]="_registerForm.email" name="email" placeholder="name@dhbw-loerrach.de" required />
        </label>
        <label>
          Passwort
          <input type="password" [(ngModel)]="_registerForm.password" name="password" required />
        </label>
        <label>
          Anzeigename
          <input type="text" [(ngModel)]="_registerForm.displayName" name="displayName" required />
        </label>
        <label>
          Kurs
          <select [(ngModel)]="_registerForm.course" name="course" [disabled]="_coursesLoading()" required>
            @for (course of _courses(); track course.code) {
              <option [value]="course.code">{{ courseLabel(course) }}</option>
            }
          </select>
        </label>
        @if (_error()) {
          <p class="login-card__error">{{ _error() }}</p>
        }
        <button type="submit" [disabled]="_isLoading() || _coursesLoading() || !_registerForm.course">
          {{ _isLoading() ? 'Bitte warten…' : 'Konto erstellen' }}
        </button>
      </form>
    }
  </div>
</div>
